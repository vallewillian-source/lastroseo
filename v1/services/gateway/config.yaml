# Gateway Service Configuration
# Values are defaults; override via environment variables.

server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: 30s
  write_timeout: 30s

postgres:
  host: "localhost"
  port: 5432
  user: "lastroseo"
  password: "secret"
  dbname: "lastroseo"
  max_connections: 20

redis:
  addr: "localhost:6379"
  db: 0

asynq:
  concurrency: 20
  queues:
    critical: 6
    default: 3
    low: 1

logging:
  level: "info"
  format: "json"
